version: '3'

services:
  mongodb:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - backend_network

  node_app:
    build: ./path/to/your/node/app
    ports:
      - '3000:3000'
    depends_on:
      - mongodb
    networks:
      - backend_network

networks:
  backend_network:

volumes:
  mongo_data: {}
